<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0f172a"/>
  
  <!-- Stars -->
  <circle cx="20" cy="20" r="1.5" fill="#ffffff"/>
  <circle cx="80" cy="15" r="1" fill="#ffffff"/>
  <circle cx="15" cy="80" r="1" fill="#ffffff"/>
  <circle cx="85" cy="75" r="1.5" fill="#ffffff"/>
  <circle cx="30" cy="50" r="0.8" fill="#ffffff"/>
  <circle cx="70" cy="85" r="0.8" fill="#ffffff"/>
  
  <!-- Main star (bigger, centered) -->
  <circle cx="50" cy="45" r="3" fill="#60a5fa"/>
  <circle cx="50" cy="45" r="2" fill="#ffffff"/>
  
  <!-- Star rays -->
  <line x1="50" y1="30" x2="50" y2="35" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="55" x2="50" y2="60" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="45" x2="40" y2="45" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="45" x2="65" y2="45" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Diagonal rays -->
  <line x1="39" y1="34" x2="43" y2="38" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="61" y1="34" x2="57" y2="38" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="56" x2="43" y2="52" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="61" y1="56" x2="57" y2="52" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
</svg>
