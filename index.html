    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z8KZLD7W83"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-Z8KZLD7W83');
    </script>
    <script>
      // GitHub Pages SPA redirect handler
      // Checks if this is a redirect from 404.html and restores the URL
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.pathname) {
          // Remove the base path from redirect since React Router handles it
          var basePath = '/darkSky';
          if (redirect.startsWith(basePath)) {
            redirect = redirect.substring(basePath.length) || '/';
          }
          history.replaceState(null, null, basePath + redirect);
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
